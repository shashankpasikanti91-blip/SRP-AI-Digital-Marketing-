# ── SRP Marketing OS — Development Overrides ────────────────────────────────
# Usage: docker compose -f docker-compose.yml -f docker-compose.dev.yml up

services:

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: uvicorn app.main:create_app --factory --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app  # writable for hot-reload
    environment:
      ENVIRONMENT: development
      DEBUG: "true"
    ports:
      - "8000:8000"

  celery-worker:
    command: celery -A app.workers.celery_app worker --loglevel=debug --concurrency=2 --queues=celery,ai,social,email
    volumes:
      - ./backend:/app

  celery-beat:
    command: celery -A app.workers.celery_app beat --loglevel=debug
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:8000/api/v1

  # Flower — Celery monitoring UI (dev only)
  flower:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A app.workers.celery_app flower --port=5555
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-srp}:${POSTGRES_PASSWORD:-srp_secret}@db:5432/${POSTGRES_DB:-srp_marketing}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379/0
    ports:
      - "5555:5555"
    depends_on:
      - redis
    networks:
      - backend
