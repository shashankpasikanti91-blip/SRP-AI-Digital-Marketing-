# ── SRP Marketing OS — Production Docker Compose (Low-RAM optimized) ─────────
# Target: Hetzner 4GB VPS shared with MediFlow (~2GB budget for this stack)
# RAM budget per service:
#   db:            ~120 MB  (pg tuned)
#   redis:          ~40 MB  (maxmemory 128m)
#   backend:        ~140 MB (1 uvicorn worker)
#   celery-worker:  ~150 MB (2 concurrent tasks)
#   celery-beat:     ~60 MB (scheduler only)
#   frontend:        ~20 MB (nginx static)
#   ─────────────────────────────
#   Total:          ~530 MB — leaves headroom for OS + MediFlow

services:

  # ── PostgreSQL Database ─────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-srp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-srp_secret}
      POSTGRES_DB: ${POSTGRES_DB:-srp_marketing}
      # Low-RAM PostgreSQL tuning via env (overrides postgresql.conf defaults)
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    command: >
      postgres
      -c shared_buffers=64MB
      -c effective_cache_size=192MB
      -c work_mem=4MB
      -c maintenance_work_mem=32MB
      -c max_connections=20
      -c wal_buffers=4MB
      -c checkpoint_completion_target=0.9
      -c random_page_cost=1.1
      -c effective_io_concurrency=200
      -c min_wal_size=80MB
      -c max_wal_size=256MB
      -c log_min_duration_statement=1000
      -c log_timezone=UTC
      -c timezone=UTC
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-srp} -d ${POSTGRES_DB:-srp_marketing}"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - srp_internal
    mem_limit: 192m
    mem_reservation: 64m
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── Redis Cache & Broker ────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-redis_secret}
      --maxmemory 96mb
      --maxmemory-policy allkeys-lru
      --appendonly no
      --save ""
      --loglevel warning
      --tcp-keepalive 60
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD:-redis_secret}", "ping"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - srp_internal
    mem_limit: 128m
    mem_reservation: 48m
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  # ── Backend FastAPI ─────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-srp}:${POSTGRES_PASSWORD:-srp_secret}@db:5432/${POSTGRES_DB:-srp_marketing}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379/0
      # Pool tuned for low-RAM: fewer idle connections
      DATABASE_POOL_SIZE: "3"
      DATABASE_MAX_OVERFLOW: "5"
      # Single worker — asyncio handles concurrency, saves ~360MB vs 4 workers
      WEB_WORKERS: "1"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - srp_internal
    mem_limit: 256m
    mem_reservation: 128m
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"

  # ── Celery Worker ───────────────────────────────────────────────────────
  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    # 2 concurrent tasks — enough for AI jobs on 4GB VPS (was 4)
    # --max-tasks-per-child recycles worker processes to prevent memory leaks
    command: >
      celery -A app.workers.celery_app worker
      --loglevel=warning
      --concurrency=2
      --queues=celery,ai,social,email
      --max-tasks-per-child=50
      --without-gossip
      --without-mingle
      --without-heartbeat
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-srp}:${POSTGRES_PASSWORD:-srp_secret}@db:5432/${POSTGRES_DB:-srp_marketing}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app:ro
    networks:
      - srp_internal
    mem_limit: 256m
    mem_reservation: 96m
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.workers.celery_app inspect ping -d celery@$$HOSTNAME --timeout 5 2>&1 | grep -q pong || exit 1"]
      interval: 60s
      timeout: 15s
      start_period: 60s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"

  # ── Celery Beat Scheduler ───────────────────────────────────────────────
  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    command: >
      celery -A app.workers.celery_app beat
      --loglevel=warning
      --scheduler celery.beat.PersistentScheduler
      --schedule /tmp/celerybeat-schedule
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-srp}:${POSTGRES_PASSWORD:-srp_secret}@db:5432/${POSTGRES_DB:-srp_marketing}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app:ro
    networks:
      - srp_internal
    mem_limit: 128m
    mem_reservation: 48m
    healthcheck:
      # pgrep not in python:slim — check PID 1 (the beat process) is alive
      test: ["CMD-SHELL", "kill -0 1 2>/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  # ── Frontend React (nginx static) ───────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - srp_internal
    mem_limit: 48m
    mem_reservation: 16m
    healthcheck:
      # Use 127.0.0.1 to force IPv4 — alpine wget resolves 'localhost' to ::1 first
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── Nginx Reverse Proxy ─────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - certbot_webroot:/var/www/certbot:ro
    depends_on:
      - backend
      - frontend
    networks:
      - srp_internal
    mem_limit: 32m
    mem_reservation: 16m
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

# ── Volumes ─────────────────────────────────────────────────────────────────
volumes:
  postgres_data:
  redis_data:
  certbot_webroot:

# ── Single internal network (was 2 bridge networks) ─────────────────────────
networks:
  srp_internal:
    driver: bridge

