# ── INIT CONFIG — HTTP only (used to obtain SSL cert via certbot) ──────────
# Use this config BEFORE you have SSL certificates.
# Once certbot issues the cert, switch to nginx.conf.
#
# Usage on server:
#   cp nginx/nginx-init.conf nginx/nginx.conf.bak   # backup main conf
#   docker run --rm -p 80:80 \
#     -v $(pwd)/nginx/nginx-init.conf:/etc/nginx/nginx.conf:ro \
#     -v certbot_webroot:/var/www/certbot \
#     nginx:1.27-alpine
#   certbot certonly --webroot -w /path/to/certbot_webroot -d app.srpailabs.com ...
# Then copy certs and restart with main nginx.conf.

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    server {
        listen 80;
        server_name app.srpailabs.com;

        # Serve Let's Encrypt ACME challenges
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Temporary: serve backend directly on HTTP (before HTTPS is up)
        location / {
            proxy_pass http://backend:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
